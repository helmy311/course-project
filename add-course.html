<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Add Course - Personal Course Organizer</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header>
        <nav>
            <ul>
                <li><a href="index.html">Home</a></li>
                <li><a href="courses.html">My Courses</a></li>
                <li><a href="add-course.html">Add Course</a></li>
                <li><a href="contact.html">Contact Us</a></li>
            </ul>
        </nav>
    </header>

    <main>
        <section>
            <h2>Add a New Course</h2>
            <form action="#" method="POST">
                <label for="courseName">Course Name:</label>
                <input type="text" id="courseName" name="courseName" required placeholder="Enter course name">

                <label for="instructor">Instructor:</label>
                <input type="text" id="instructor" name="instructor" required placeholder="Enter instructor's name">

                <label for="creditHours">Credit Hours:</label>
                <input type="number" id="creditHours" name="creditHours" min="1" max="10" required placeholder="e.g., 3">

                <label for="notes">Notes:</label>
                <textarea id="notes" name="notes" rows="4" placeholder="Any additional notes..."></textarea>

                <button type="submit">Save Course</button>
            </form>
        </section>
    </main>

    <footer>
        <p>&copy; 2026 Personal Course Organizer. All rights reserved.</p>
    </footer>
</body>
</html>
